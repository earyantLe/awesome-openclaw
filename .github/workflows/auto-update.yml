name: Auto Update Resources

on:
  # 定时触发：每 2 小时执行一次（UTC 时间）
  schedule:
    # 在每小时的第 15 分钟执行，避开整点高峰
    # 注意：GitHub Actions 使用 UTC 时间
    # 北京时间 = UTC + 8
    - cron: '15 */2 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      full_update:
        description: '执行全量更新（而非增量）'
        required: false
        default: 'false'
        type: boolean

# 并发控制：同一时间只允许一个更新任务运行
concurrency:
  group: auto-update
  cancel-in-progress: false

# 权限配置
permissions:
  contents: read  # 读取仓库内容
  # 如需自动提交更新，添加 write 权限：
  # contents: write

env:
  LOG_RETENTION_DAYS: 7
  MAX_CONCURRENT: 3
  RATE_LIMIT_DELAY: 2

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g jq

      - name: Run auto-update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 如需使用自定义 Token：
          # GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          chmod +x .github/scripts/auto-update.sh
          .github/scripts/auto-update.sh

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-logs-${{ github.run_id }}
          path: /tmp/awesome-openclaw-logs/
          retention-days: ${{ env.LOG_RETENTION_DAYS }}

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "$TELEGRAM_BOT_TOKEN" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=🚨 *Awesome OpenClaw 更新失败*%0A工作流：${{ github.workflow }}%0A运行 ID: ${{ github.run_id }}%0A查看详情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d "parse_mode=Markdown"
          fi

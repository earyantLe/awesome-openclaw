name: Link Checker

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  push:
    branches:
      - main
    paths:
      - '**.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --exclude 'localhost'
            --exclude '127.0.0.1'
            --exclude 'discord.com/invite/*'
            --exclude 'github.com/earyantLe/feishu-openclaw-plugin'
            --accept '200,206,403,429'
            '**/*.md'
          output: link-check-result.md
          fail: true

      - name: Create Issue From File
        if: failure()
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: '🔗 Link Checker Found Broken Links'
          content-filepath: link-check-result.md
          labels: broken-links,automated-issue
